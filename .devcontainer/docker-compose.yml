# Dev-only stack: .NET dev container + SQL Server (Linux).
# Do not use these credentials outside local development.

services:
  app:
    image: mcr.microsoft.com/devcontainers/dotnet:1-7.0-bookworm
    container_name: codecircle-dev
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=CodeCircle_Dev;User Id=sa;Password=CodeCircle!Dev2024;TrustServerCertificate=True;MultipleActiveResultSets=true"

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: codecircle-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "CodeCircle!Dev2024"
    ports:
      - "1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 45s
